# .github/workflows/playwright.yml
# Pipeline CI/CD para ejecutar los tests E2E en GitHub Actions
# Fuente: https://playwright.dev/docs/ci-intro
#
# ¿Por qué GitHub Actions?
# Es gratuito para repositorios públicos, está integrado en GitHub
# y no requiere infraestructura externa. Cada push ejecuta los tests
# y publica el reporte automáticamente.

name: Playwright E2E Tests
# Nombre del workflow — aparece en la pestaña "Actions" de GitHub

on:
  push:
    branches: [main, master]
    # Se ejecuta en cada push a las ramas principales
  pull_request:
    branches: [main, master]
    # También se ejecuta en Pull Requests antes de hacer merge
  workflow_dispatch:
    # Permite ejecutar el workflow manualmente desde la UI de GitHub

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    # ubuntu-latest → runner gratuito de GitHub con Ubuntu

    steps:
      # -----------------------------------------------
      # PASO 1: Checkout del código
      # -----------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------
      # PASO 2: Instalar pnpm
      # -----------------------------------------------
      # - name: Setup pnpm
      #  uses: pnpm/action-setup@v4
      # with:

      #version: 11
      # pnpm/action-setup → action oficial de pnpm para GitHub Actions
      # Instala pnpm v9 en el runner antes de usarlo

      # -----------------------------------------------
      # PASO 3: Configurar Node.js con caché de pnpm
      # -----------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

        with:
          node-version: "20"
          cache: "pnpm"
          # cache: "pnpm" → cachea el store de pnpm entre runs
          # Esto hace que la segunda ejecución sea mucho más rápida

      # -----------------------------------------------
      # PASO 4: Instalar dependencias
      # -----------------------------------------------
      - name: Install dependencies
        run: pnpm install
        # pnpm install → equivalente a npm ci pero más rápido
        # Lee el pnpm-lock.yaml para instalar versiones exactas

      # -----------------------------------------------
      # PASO 5: Instalar navegadores de Playwright
      # -----------------------------------------------
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        # pnpm exec → ejecuta un binario de las devDependencies del proyecto
        # --with-deps → instala las dependencias del sistema que necesita Chromium

      # -----------------------------------------------
      # PASO 6: Ejecutar los tests
      # -----------------------------------------------
      - name: Run Playwright tests
        run: pnpm exec playwright test

      # -----------------------------------------------
      # PASO 7: Subir el reporte HTML
      # -----------------------------------------------
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # -----------------------------------------------
  # JOB 2: Publicar reporte en GitHub Pages
  # -----------------------------------------------
  deploy-report:
    name: Deploy Report to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    if: always()

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download test report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
